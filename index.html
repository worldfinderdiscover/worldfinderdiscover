<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFinder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #dropPinBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .user-location-dot {
            background-color: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px #007bff;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <button id="dropPinBtn">📌 Drop a Pin Here</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/pocketbase/js-sdk@latest/dist/pocketbase.umd.js"></script>

    <script>
        console.log("App initialization start...");

        // 1. Core Map Configuration
        const map = L.map('map', { zoomControl: false }).setView([33.4242, -111.9281], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        console.log("Leaflet map canvas mounted.");

        // 2. Database Connection
        const pb = new PocketBase('https://worldfinder-worldfinder.hf.space');
        
        let currentUserLatLng = null;
        let userLocationMarker = null;
        const MAX_RADIUS_METERS = 200; 

        // SMART TRACKING: Keeps an exact record of which pin IDs are currently drawn on screen
        const activeMarkers = {};

        // 3. Render Tracking Pin Data
        function drawPinOnMap(pinData) {
            // If this exact pin ID is already drawn on the map, don't touch it
            if (activeMarkers[pinData.id]) return;

            const createdTime = new Date(pinData.created); 
            const lifespan = 60 * 60 * 1000; 
            const expTime = new Date(createdTime.getTime() + lifespan);
            const expTimeString = expTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const currentTime = new Date();
            const millisecondsLeft = expTime.getTime() - currentTime.getTime();

            if (millisecondsLeft <= -60000) return; 

            // Create and render the new marker
            const marker = L.marker([pinData.lat, pinData.lng]).addTo(map).bindPopup(`
                <div style="font-family: sans-serif;">
                    <strong>${pinData.message}</strong><br>
                    <span style="color: red; font-size: 11px; font-weight: bold;">⏱️ Expires at ${expTimeString}</span>
                </div>
            `);

            // Save this marker to our smart tracking object using its unique database ID
            activeMarkers[pinData.id] = marker;

            // Handle the real-time browser self-destruct countdown
            if (millisecondsLeft > 0) {
                setTimeout(() => { 
                    map.removeLayer(marker); 
                    delete activeMarkers[pinData.id]; // Remove from tracking registry
                }, millisecondsLeft);
            }
        }

        // 4. Synchronization Handlers
        async function syncPinsPipeline() {
            try {
                // Fetch the 50 most recent pins
                const records = await pb.collection('pins').getList(1, 50, { sort: '-created' });
                records.items.forEach(pinData => {
                    if (pinData.lat && pinData.lng) {
                        drawPinOnMap(pinData);
                    }
                });
            } catch (err) { 
                console.log("Sync loop standby:", err); 
            }
        }

        function startLiveSync() {
            pb.collection('pins').subscribe('*', function (e) {
                if (e.action === 'create') drawPinOnMap(e.record);
            }).catch(err => {
                console.log("Realtime subscription routing limited. Relying on high-speed delta loop.");
            });
        }

        // Run initial data population
        syncPinsPipeline().then(() => {
            startLiveSync();
        });

        // HIGH-SPEED SMART DELTA LOOP
        // Instead of wiping the map every 15 seconds, we pull down fresh data every 2 seconds.
        // The smart tracking object ensures new pins appear immediately without affecting old ones.
        setInterval(syncPinsPipeline, 2000);

        // 5. High-Precision Smoothed Geolocation Core with Laptop Fallback
        let targetLatLng = null;
        let animationFrameId = null;

        // Smoothly slides the marker from its current position to the new target
        function smoothAnimateMarker() {
            if (!userLocationMarker || !targetLatLng) return;

            const currentLatLng = userLocationMarker.getLatLng();
            const deltaLat = targetLatLng[0] - currentLatLng.lat;
            const deltaLng = targetLatLng[1] - currentLatLng.lng;
            const ease = 0.1; 

            if (Math.abs(deltaLat) > 0.00001 || Math.abs(deltaLng) > 0.00001) {
                const newLat = currentLatLng.lat + deltaLat * ease;
                const newLng = currentLatLng.lng + deltaLng * ease;
                userLocationMarker.setLatLng([newLat, newLng]);
                animationFrameId = requestAnimationFrame(smoothAnimateMarker);
            } else {
                userLocationMarker.setLatLng(targetLatLng);
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // SMART LOCALIZATION ROUTER
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    let lat = position.coords.latitude;
                    let lng = position.coords.longitude;

                    // LAPTOP/WI-FI FALLBACK: If signal accuracy is broad (like sitting inside a cafe on Wi-Fi)
                    // We lock the position to the Tempe / Chill Room workspace baseline so testing doesn't break.
                    if (position.coords.accuracy > 40) {
                        console.log(`Wi-Fi precision broad (${Math.round(position.coords.accuracy)}m). Activating Tempe simulation anchor.`);
                        lat = 33.4242; // Center anchor point near ASU campus/Chill Room area
                        lng = -111.9281;
                    }

                    targetLatLng = [lat, lng];
                    currentUserLatLng = [lat, lng]; 

                    if (!userLocationMarker) {
                        map.setView(targetLatLng, 17);
                        const blueDotIcon = L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] });
                        userLocationMarker = L.marker(targetLatLng, { icon: blueDotIcon }).addTo(map);
                    } else {
                        if (!animationFrameId) {
                            animationFrameId = requestAnimationFrame(smoothAnimateMarker);
                        }
                    }
                },
                (error) => { 
                    console.log("Hardware GPS timed out. Routing to static Tempe testing anchor.");
                    // HARDWARE ISOLATION FALLBACK: If laptop completely blocks permissions
                    targetLatLng = [33.4242, -111.9281];
                    currentUserLatLng = [33.4242, -111.9281];
                    if (!userLocationMarker) {
                        map.setView(targetLatLng, 17);
                        const blueDotIcon = L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] });
                        userLocationMarker = L.marker(targetLatLng, { icon: blueDotIcon }).addTo(map);
                    }
                },
                { 
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 4000 
                }
            );
        }
        // 6. Output Operations
        async function sendPinToDatabase(message, lat, lng) {
            try {
                const newRecord = await pb.collection('pins').create({ message: message, lat: lat, lng: lng });
                // Instantly draw your own dropped pin locally so you get zero layout lag
                drawPinOnMap(newRecord);
            } catch (err) { 
                alert("Database transmission failed."); 
            }
        }

        document.getElementById('dropPinBtn').addEventListener('click', () => {
            if (!currentUserLatLng) { alert("Waiting for GPS telemetry signal..."); return; }
            const message = prompt("What's happening right here?");
            if (message) sendPinToDatabase(message, currentUserLatLng[0], currentUserLatLng[1]);
        });

        map.on('click', function(e) {
            if (!currentUserLatLng) {
                alert("Proximity verification requires hardware GPS tracking.");
                return;
            }

            const clickedLocation = e.latlng;
            const userLocation = L.latLng(currentUserLatLng[0], currentUserLatLng[1]);
            const distance = userLocation.distanceTo(clickedLocation);

            if (distance > MAX_RADIUS_METERS) {
                alert(`Target distance is beyond your verified physical proximity boundary.`);
                return;
            }

            const message = prompt("What's happening over there?");
            if (message) sendPinToDatabase(message, clickedLocation.lat, clickedLocation.lng);
        });
    </script>
</body>
</html>
