<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFinder - NextGen</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* CENTRAL HUD CONTROL PILL */
        #action-pill-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1005;
            display: flex;
            justify-content: center;
        }
        #action-pill {
            background: rgba(26, 31, 44, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .hud-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .hud-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        #pulse-btn {
            background: #ff4757;
        }
        #pulse-btn:hover {
            background: #ff6b81;
        }

        /* SLIDING DRAWER CONTAINER */
        #feed-drawer {
            position: absolute;
            top: 0;
            right: -380px;
            width: 340px;
            height: 100% ;
            background: rgba(17, 17, 22, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1010;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #feed-drawer.active {
            transform: translateX(-380px);
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .drawer-header h3 {
            margin: 0;
            color: #ffffff;
            font-size: 18px;
        }
        #proximity-feed-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* CLEAN STREAM ROW COMPONENT */
        .feed-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            position: relative;
            transition: border-color 0.2s;
        }
        .feed-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }
        .feed-card p {
            margin: 0 0 8px 0;
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.4;
        }
        .feed-meta {
            font-size: 11px;
            color: #888888;
            display: flex;
            gap: 10px;
        }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #ff4757;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .delete-btn:hover {
            background: rgba(255, 71, 87, 0.1);
        }

        /* INPUT PANEL DRAWER */
        #inputPanel {
            position: absolute;
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #1a1f2c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 1006;
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        #inputPanel.active {
            bottom: 0;
        }
        #pinMessageInput {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        #pinTierSelect {
            background: #2a3142;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
        }
    </style>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>

    <div id="map"></div>

    <div id="action-pill-container">
        <div id="action-pill">
            <button class="hud-btn" id="vibe-btn">Catch a Vibe</button>
            <button class="hud-btn" id="pulse-btn">Drop Pulse</button>
        </div>
    </div>

    <div id="feed-drawer">
        <div class="drawer-header">
            <h3>Proximity Feed</h3>
            <button class="hud-btn" id="close-drawer-btn">✕</button>
        </div>
        <div id="proximity-feed-list"></div>
    </div>

    <div id="inputPanel">
        <h4 style="margin: 0 0 12px 0; color: white;">Drop Local Pulse</h4>
        <textarea id="pinMessageInput" rows="3" placeholder="What's happening right here, right now?"></textarea>
        <div class="input-row">
            <label style="color: #aaa; font-size: 13px;">Lifespan Duration:</label>
            <select id="pinTierSelect">
                <option value="1">1 Hour (Flash)</option>
                <option value="6">6 Hours (Event)</option>
                <option value="24">24 Hours (Daily)</option>
                <option value="168">1 Week (Weekly)</option>
            </select>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="hud-btn" id="cancelPinBtn">Cancel</button>
            <button class="hud-btn" id="submitPinBtn" style="background: #2ed573;">Publish</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
